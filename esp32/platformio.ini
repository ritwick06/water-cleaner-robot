; PlatformIO Project Configuration for AWSCR ESP32 Firmware
; ─────────────────────────────────────────────────────────────
; Board: ESP32 DevKitC (or any ESP32 board with WiFi)
; Framework: Arduino
; Upload: USB Serial (auto-detect)

[env:esp32dev]
platform   = espressif32
board      = esp32dev
framework  = arduino

; Serial monitor speed
monitor_speed = 115200

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_RUNNING_CORE=1

; Libraries (auto-downloaded by PlatformIO)
lib_deps =
    ; MQTT
    knolleary/PubSubClient @ ^2.8
    ; JSON
    bblanchon/ArduinoJson @ ^7.0
    ; MPU6050
    electroniccats/MPU6050 @ ^1.3
    ; I2Cdev (required by MPU6050)
    jrowberg/I2Cdev @ ^0.0.2

; Upload settings
upload_speed = 921600

; Native unit test environment (runs on host, no hardware)
[env:native]
platform   = native
build_flags =
    -std=c++14
    -DNATIVE_TEST
lib_compat_mode = soft
